##############################################################
# SAJ Solar Dashboard — Lovelace YAML
# ============================================================
# Como importar no Home Assistant:
#
# OPCAO 1 — Nova aba no painel existente:
#   1. Va na Dashboard principal
#   2. Clique nos 3 pontinhos (⋮) > Editar painel
#   3. Clique em "+ Adicionar aba"
#   4. Clique nos 3 pontinhos da nova aba > "Editar em YAML"
#   5. Cole todo o conteudo abaixo (a partir de "title:")
#   6. Salve
#
# OPCAO 2 — Novo painel dedicado:
#   1. Configuracoes > Paineis > Adicionar Painel
#   2. Escolha tipo "Manual"
#   3. Edite em YAML e cole o conteudo
##############################################################

title: "\u2600\uFE0F Solar"
icon: mdi:solar-power-variant
path: solar
type: sections
max_columns: 4
sections:

  # ============================================
  # PLANTA — Visão Geral
  # ============================================
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: "\u2600\uFE0F Usina Solar — Bairro Novo"
        heading_style: title

      - type: tile
        entity: sensor.bairro_novo_potencia_total
        name: "Potência Agora"
        color: amber
        icon: mdi:solar-power-variant

      - type: tile
        entity: sensor.bairro_novo_energia_total_hoje
        name: "Energia Hoje"
        color: green
        icon: mdi:lightning-bolt

      - type: tile
        entity: sensor.bairro_novo_energia_total_produzida
        name: "Energia Total"
        color: blue
        icon: mdi:counter

      - type: tile
        entity: sensor.bairro_novo_potencia_de_pico
        name: "Pico de Potência"
        color: orange
        icon: mdi:chart-bell-curve-cumulative

      - type: tile
        entity: sensor.bairro_novo_receita_total_hoje
        name: "Receita Hoje"
        color: green
        icon: mdi:currency-brl

      - type: tile
        entity: sensor.bairro_novo_receita_total
        name: "Receita Total"
        color: teal
        icon: mdi:cash-multiple

      - type: tile
        entity: sensor.bairro_novo_dispositivos_online
        name: "Inversores Online"
        color: cyan
        icon: mdi:check-network

      - type: tile
        entity: sensor.bairro_novo_total_de_dispositivos
        name: "Total Inversores"
        color: grey
        icon: mdi:solar-panel

  # ============================================
  # INVERSOR — SALA
  # ============================================
  - type: grid
    cards:
      - type: heading
        heading: "\U0001F50C Inversor — Sala"
        heading_style: title

      - type: gauge
        entity: sensor.sala_potencia
        name: "Potência"
        min: 0
        max: 2250
        severity:
          green: 1000
          yellow: 500
          red: 0
        needle: true

      - type: tile
        entity: sensor.sala_energia_hoje
        name: "Hoje"
        color: green
        icon: mdi:lightning-bolt

      - type: tile
        entity: sensor.sala_energia_este_mes
        name: "Mês"
        color: blue
        icon: mdi:calendar-month

      - type: tile
        entity: sensor.sala_energia_este_ano
        name: "Ano"
        color: indigo
        icon: mdi:calendar

      - type: tile
        entity: sensor.sala_energia_total
        name: "Total"
        color: purple
        icon: mdi:counter

      - type: tile
        entity: sensor.sala_tensao_da_rede
        name: "Tensão"
        color: amber
        icon: mdi:flash-triangle

      - type: tile
        entity: sensor.sala_frequencia_da_rede
        name: "Frequência"
        color: cyan
        icon: mdi:sine-wave

      - type: tile
        entity: sensor.sala_estado
        name: "Estado"
        icon: mdi:information

      - type: tile
        entity: sensor.sala_receita_hoje
        name: "Receita"
        color: green
        icon: mdi:currency-brl

  # ============================================
  # INVERSOR — GARAGEM
  # ============================================
  - type: grid
    cards:
      - type: heading
        heading: "\U0001F50C Inversor — Garagem"
        heading_style: title

      - type: gauge
        entity: sensor.garagem_potencia
        name: "Potência"
        min: 0
        max: 2250
        severity:
          green: 1000
          yellow: 500
          red: 0
        needle: true

      - type: tile
        entity: sensor.garagem_energia_hoje
        name: "Hoje"
        color: green
        icon: mdi:lightning-bolt

      - type: tile
        entity: sensor.garagem_energia_este_mes
        name: "Mês"
        color: blue
        icon: mdi:calendar-month

      - type: tile
        entity: sensor.garagem_energia_este_ano
        name: "Ano"
        color: indigo
        icon: mdi:calendar

      - type: tile
        entity: sensor.garagem_energia_total
        name: "Total"
        color: purple
        icon: mdi:counter

      - type: tile
        entity: sensor.garagem_tensao_da_rede
        name: "Tensão"
        color: amber
        icon: mdi:flash-triangle

      - type: tile
        entity: sensor.garagem_frequencia_da_rede
        name: "Frequência"
        color: cyan
        icon: mdi:sine-wave

      - type: tile
        entity: sensor.garagem_estado
        name: "Estado"
        icon: mdi:information

      - type: tile
        entity: sensor.garagem_receita_hoje
        name: "Receita"
        color: green
        icon: mdi:currency-brl

  # ============================================
  # GRÁFICOS — Histórico
  # ============================================
  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: "\U0001F4C8 Histórico de Produção"
        heading_style: title

      - type: history-graph
        title: "Potência — Últimas 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.bairro_novo_potencia_total
            name: "Total"
          - entity: sensor.sala_potencia
            name: "Sala"
          - entity: sensor.garagem_potencia
            name: "Garagem"

      - type: history-graph
        title: "Tensão da Rede — Últimas 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.sala_tensao_da_rede
            name: "Sala"
          - entity: sensor.garagem_tensao_da_rede
            name: "Garagem"

  - type: grid
    column_span: 2
    cards:
      - type: heading
        heading: "\U0001F50B Produção por Inversor"
        heading_style: title

      - type: history-graph
        title: "Energia Hoje — Últimas 24h"
        hours_to_show: 24
        entities:
          - entity: sensor.sala_energia_hoje
            name: "Sala"
          - entity: sensor.garagem_energia_hoje
            name: "Garagem"

      - type: history-graph
        title: "Frequência da Rede"
        hours_to_show: 24
        entities:
          - entity: sensor.sala_frequencia_da_rede
            name: "Sala"
          - entity: sensor.garagem_frequencia_da_rede
            name: "Garagem"
